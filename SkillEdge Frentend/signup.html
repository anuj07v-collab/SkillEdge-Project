<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillEdge | Sign Up</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./CSS/SignUp.css" />
  </head>

  <body>
    <div class="page">
      <div class="wrap">
        <div class="nav">
          <div class="logo">
            <img src="./assets/image/logo.png" alt="logo" />Skill<span>Edge</span>
          </div>

          <!-- ✅ navbar links connected -->
          <div class="navLinks">
            <a href="index.html">Home</a>
          </div>

          <a href="login.html"><button class="navBtn">Back to Login</button></a>
        </div>

        <div class="cardGrid">
          <div class="imageCard">
            <img
              src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1600&q=80"
              alt="Study"
            />
            <div class="imageOverlay"></div>
            <div class="imageText">
              <h1>Create your <span>SkillEdge</span> account</h1>
              <p>
                Get access to premium courses, live sessions, and progress
                tracking.
              </p>
            </div>
          </div>

          <div class="formCard">
            <div class="formTitle">Sign Up</div>
            <div class="formSub">Join SkillEdge and start learning</div>

            <div class="msg" id="msg"></div>

            <form id="signupForm">
              <div class="field">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Your name" required />
              </div>

              <div class="field">
                <label>Mobile Number</label>
                <input
                  type="tel"
                  id="mobile"
                  placeholder="10 digit mobile number"
                  maxlength="10"
                  inputmode="numeric"
                  required
                />
              </div>

              <div class="field">
                <label>Email</label>
                <input
                  type="email"
                  id="email"
                  placeholder="you@example.com"
                  required
                />
              </div>

              <div class="field">
                <label>Password</label>
                <input
                  type="password"
                  id="pass"
                  minlength="6"
                  placeholder="Minimum 6 characters"
                  required
                />
              </div>

              <div class="field">
                <label>Confirm Password</label>
                <input
                  type="password"
                  id="cpass"
                  minlength="6"
                  placeholder="Re-enter password"
                  required
                />
              </div>

              <button class="btn" type="submit">Create Account</button>

              <div class="bottomText">
                Already have an account? <a href="login.html">Login</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="./javascript/Signup.js"></script>
  </body>
</html>
